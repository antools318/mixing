<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Music Cleaner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap');

    :root {
      --bg: #121212;
      --card: #181818;
      --ink: #f5f5f5;
      --muted: #bdbdbd;
      --accent: #1db954;
      --border: #2a2a2a;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --btn-bg: #242424;
      --btn-text: #f5f5f5;
      --btn-border: #333;
      --btn-hover: #2d2d2d;
    }

    body[data-theme="light"] {
      --bg: #f5f5f5;
      --card: #ffffff;
      --ink: #111;
      --muted: #5a5a5a;
      --accent: #1db954;
      --border: #e5e5e5;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --btn-bg: #ffffff;
      --btn-text: #111;
      --btn-border: #d6d6d6;
      --btn-hover: #f0f0f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin: 0;
      font-size: 40px;
    }

    .tagline {
      color: var(--muted);
      margin: 6px 0 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 18px;
    }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      transition: 0.2s ease;
      background: rgba(255,255,255,0.02);
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(255,122,89,0.08);
      transform: translateY(-2px);
    }

    .dropzone strong {
      font-size: 18px;
    }

    .btn {
      background: var(--accent);
      color: #111;
      border: none;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn.secondary {
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--btn-text);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn:active {
      transform: translateY(0);
      filter: brightness(0.98);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    select, input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .section-title {
      font-weight: 600;
      margin: 0 0 10px;
    }

    .file-list {
      max-height: 260px;
      overflow: auto;
      border-top: 1px solid var(--border);
      margin-top: 10px;
      padding-top: 10px;
    }

    .file-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px dashed var(--border);
      font-size: 14px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .progress {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.2s ease;
    }

    .downloads {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    canvas {
      width: 100%;
      height: 90px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    .preset-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    }

    .preset-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .preset-btn.active {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .toggle input {
      width: 40px;
      height: 22px;
      appearance: none;
      background: var(--border);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .toggle input::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      transition: 0.2s ease;
    }

    .toggle input:checked::after {
      transform: translateX(18px);
    }

    .seekbar {
      height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    .seekbar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.06s linear;
    }

    .player {
      margin-top: 8px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--btn-text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .icon-btn.primary {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .icon-btn:active {
      transform: translateY(0);
      filter: brightness(0.98);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    .loading {
      opacity: 0.7;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>AI Music Cleaner</h1>
        <p class="tagline">Fast, simple cleanup for AI-generated tracks. Less harsh, more cohesive, playlist-ready.</p>
      </div>
      <div class="row">
        <label class="toggle">
          Dark
          <input id="themeToggle" type="checkbox" />
          Light
        </label>
        <span class="pill">Web Audio API • Offline Processing</span>
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <p class="section-title">1) Upload Files</p>
        <div id="dropzone" class="dropzone">
          <strong>Drag & drop audio files</strong>
          <p class="tagline">MP3 or WAV • Multiple files supported</p>
          <div class="row" style="justify-content:center;">
            <button class="btn secondary" id="browseBtn">Browse Files</button>
            <input id="fileInput" type="file" accept="audio/*" multiple hidden />
          </div>
        </div>
        <div class="file-list" id="fileList"></div>
      </div>

      <div class="card">
        <p class="section-title">2) Mode</p>
        <div class="preset-grid" id="modeButtons">
          <button class="preset-btn active" data-value="smart">Smart</button>
          <button class="preset-btn" data-value="clean">Clean</button>
          <button class="preset-btn" data-value="enhance">Enhance</button>
          <button class="preset-btn" data-value="space">Space</button>
        </div>
        <select id="modeSelect" hidden>
          <option value="smart" selected>Smart</option>
          <option value="clean">Clean</option>
          <option value="enhance">Enhance</option>
          <option value="space">Space</option>
        </select>
        <div class="row" style="gap:14px; margin-top:10px; flex-wrap:wrap;">
          <label class="row" style="font-size:13px; color:var(--muted);">
            <input type="checkbox" id="enableReverb" /> Enable Space
          </label>
          <label class="row" style="font-size:13px; color:var(--muted);">
            Space Amount
            <input id="reverbAmount" type="range" min="0.10" max="0.25" step="0.01" value="0.15" />
            <span id="reverbAmountLabel">15%</span>
          </label>
        </div>

        <div style="margin-top:16px;">
          <p class="section-title">3) Process</p>
          <div class="row">
            <button class="btn" id="processBtn" disabled>Process Batch</button>
            <label class="row" style="font-size:13px; color:var(--muted);">
              <input type="checkbox" id="previewToggle" /> Preview before download
            </label>
          </div>
          <div class="status" id="status">Waiting for files…</div>
          <div class="progress"><div id="progressBar"></div></div>
        </div>

        <div style="margin-top:16px;">
          <p class="section-title">Preview</p>
          <canvas id="waveform" width="800" height="120"></canvas>
          <div style="margin-top:8px;">
            <div class="player">
              <button class="icon-btn primary" id="playBtn" disabled>Play</button>
              <div>
                <div class="seekbar" id="seekbar">
                  <div class="seekbar-fill" id="seekbarFill"></div>
                </div>
                <div class="time-row">
                  <span id="currentTime">0:00</span>
                  <span id="totalTime">0:00</span>
                </div>
              </div>
              <button class="icon-btn" id="stopBtn" disabled>Stop</button>
            </div>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <button class="btn secondary" id="downloadAllBtn" disabled>Download All WAVs</button>
        </div>
        <div class="downloads" id="downloads"></div>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const browseBtn = document.getElementById('browseBtn');
    const dropzone = document.getElementById('dropzone');
    const fileList = document.getElementById('fileList');
    const modeSelect = document.getElementById('modeSelect');
    const modeButtons = document.getElementById('modeButtons');
    const enableReverb = document.getElementById('enableReverb');
    const reverbAmount = document.getElementById('reverbAmount');
    const reverbAmountLabel = document.getElementById('reverbAmountLabel');
    const processBtn = document.getElementById('processBtn');
    const statusEl = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const downloads = document.getElementById('downloads');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const previewToggle = document.getElementById('previewToggle');
    const waveform = document.getElementById('waveform');
    const seekbar = document.getElementById('seekbar');
    const seekbarFill = document.getElementById('seekbarFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const themeToggle = document.getElementById('themeToggle');

    let files = [];
    let processedBuffers = [];
    let downloadUrls = [];
    let previewAudio = new Audio();
    let previewUrl = null;
    let isScrubbing = false;
    let rafId = null;

    browseBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    [modeSelect, enableReverb, reverbAmount].forEach((el) => {
      el.addEventListener('change', updateProcessState);
      el.addEventListener('input', updateProcessState);
    });

    modeButtons.addEventListener('click', (e) => {
      const btn = e.target.closest('.preset-btn');
      if (!btn) return;
      const value = btn.dataset.value;
      modeSelect.value = value;
      highlightMode(value);
      updateProcessState();
    });

    processBtn.addEventListener('click', async () => {
      await processBatch();
    });

    previewAudio.addEventListener('loadedmetadata', () => {
      totalTimeEl.textContent = formatTime(previewAudio.duration);
    });
    previewAudio.addEventListener('ended', () => {
      stopRaf();
    });
    playBtn.addEventListener('click', () => {
      if (!previewAudio.src) return;
      previewAudio.play().catch(() => {});
      startRaf();
    });
    stopBtn.addEventListener('click', () => {
      pausePreview();
    });
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        const tag = document.activeElement?.tagName?.toLowerCase();
        if (tag === 'input' || tag === 'select' || tag === 'textarea') return;
        e.preventDefault();
        if (!previewAudio.src) return;
        if (!previewAudio.src) return;
        if (previewAudio.paused) {
          previewAudio.play().catch(() => {});
          startRaf();
        } else {
          pausePreview();
        }
      }
    });
    seekbar.addEventListener('mousedown', (e) => {
      isScrubbing = true;
      seekToEvent(e);
    });
    window.addEventListener('mousemove', (e) => {
      if (isScrubbing) seekToEvent(e);
    });
    window.addEventListener('mouseup', () => {
      isScrubbing = false;
    });
    seekbar.addEventListener('touchstart', (e) => {
      isScrubbing = true;
      seekToEvent(e.touches[0]);
    }, { passive: true });
    window.addEventListener('touchmove', (e) => {
      if (isScrubbing) seekToEvent(e.touches[0]);
    }, { passive: true });
    window.addEventListener('touchend', () => {
      isScrubbing = false;
    });
    downloadAllBtn.addEventListener('click', () => {
      const links = downloads.querySelectorAll('a');
      links.forEach((link, idx) => {
        setTimeout(() => link.click(), idx * 100);
      });
    });

    themeToggle.addEventListener('change', () => {
      const mode = themeToggle.checked ? 'light' : 'dark';
      setTheme(mode);
    });

    function handleFiles(fileListInput) {
      const newFiles = Array.from(fileListInput).filter(f => f.type.startsWith('audio/'));
      if (!newFiles.length) return;
      files = newFiles;
      processedBuffers = [];
      downloadUrls.forEach((u) => URL.revokeObjectURL(u));
      downloadUrls = [];
      downloads.innerHTML = '';
      downloadAllBtn.disabled = true;
      renderFileList();
      updateProcessState();
      statusEl.textContent = `${files.length} file(s) ready.`;
      drawWaveformPlaceholder();
      stopPreview();
    }

    function renderFileList() {
      fileList.innerHTML = '';
      files.forEach((f) => {
        const row = document.createElement('div');
        row.className = 'file-item';
        row.innerHTML = `<span>${f.name}</span><span>${(f.size/1024/1024).toFixed(2)} MB</span>`;
        fileList.appendChild(row);
      });
    }

    function updateProcessState() {
      processBtn.disabled = !files.length;
      if (modeSelect.value === 'space') {
        enableReverb.checked = true;
        enableReverb.disabled = true;
      } else if (modeSelect.value === 'smart') {
        enableReverb.disabled = true;
      } else {
        enableReverb.disabled = false;
      }
      reverbAmountLabel.textContent = `${Math.round(parseFloat(reverbAmount.value) * 100)}%`;
      reverbAmount.disabled = !enableReverb.checked && modeSelect.value !== 'space' && modeSelect.value !== 'smart';
      highlightMode(modeSelect.value);
    }

    function setProgress(pct) {
      progressBar.style.width = `${pct}%`;
    }

    async function processBatch() {
      if (!files.length) return;

      statusEl.textContent = 'Starting batch…';
      processBtn.disabled = true;
      processBtn.classList.add('loading');
      processBtn.textContent = 'Processing...';
      setProgress(0);
      processedBuffers = [];
      downloadUrls.forEach((u) => URL.revokeObjectURL(u));
      downloadUrls = [];
      downloads.innerHTML = '';
      downloadAllBtn.disabled = true;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        statusEl.textContent = `Processing ${file.name} (${i+1}/${files.length})…`;
        const arrayBuffer = await file.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        await audioCtx.close();

        let settings = getSettings();
        if (settings.mode === 'smart') {
          const smartMode = await analyzeSmartMode(audioBuffer);
          settings = { ...settings, mode: smartMode };
          statusEl.textContent = `Smart Mode → ${smartMode.toUpperCase()} (${file.name})`;
        }
        const processed = await processBufferOffline(audioBuffer, settings);
        processedBuffers.push(processed);

        const wavBlob = audioBufferToWavBlob(processed);
        const url = URL.createObjectURL(wavBlob);
        downloadUrls.push(url);
        const dl = document.createElement('a');
        dl.href = url;
        dl.download = `${file.name.replace(/\.[^/.]+$/, '')}_cleaned.wav`;
        dl.className = 'btn secondary';
        dl.textContent = `Download ${file.name}`;
        downloads.appendChild(dl);

        if (previewToggle.checked && i === 0) {
          drawWaveform(processed);
          preparePreview(processed);
        }

        setProgress(Math.round(((i + 1) / files.length) * 100));
      }

      if (!previewToggle.checked && processedBuffers[0]) {
        drawWaveform(processedBuffers[0]);
        preparePreview(processedBuffers[0]);
      }

      statusEl.textContent = `Done. ${files.length} file(s) processed.`;
      downloadAllBtn.disabled = files.length === 0;
      processBtn.textContent = 'Process Batch';
      processBtn.classList.remove('loading');
      updateProcessState();
    }

    async function processBufferOffline(inputBuffer, settings) {
      const sampleRate = inputBuffer.sampleRate;
      const offline = new OfflineAudioContext(
        inputBuffer.numberOfChannels,
        inputBuffer.length,
        sampleRate
      );

      const source = offline.createBufferSource();
      source.buffer = inputBuffer;

      // High shelf EQ
      const highShelf = offline.createBiquadFilter();
      highShelf.type = 'highshelf';

      // Low shelf (Enhance only)
      const lowShelf = offline.createBiquadFilter();
      lowShelf.type = 'lowshelf';

      // Output gain to prevent clipping
      const outputGain = offline.createGain();

      const params = getBaseParams(settings);

      highShelf.frequency.value = params.highShelfFreq;
      highShelf.gain.value = params.highShelfGain;

      lowShelf.frequency.value = 120;
      lowShelf.gain.value = params.lowShelfGain;

      outputGain.gain.value = params.outputGain;

      // Base chain
      source.connect(highShelf);
      highShelf.connect(lowShelf);

      if (params.enableReverb) {
        const dryGain = offline.createGain();
        const wetGain = offline.createGain();
        const summed = offline.createGain();

        const highpass = offline.createBiquadFilter();
        highpass.type = 'highpass';
        highpass.frequency.value = 200;
        highpass.Q.value = 0.7;

        const preDelay = offline.createDelay(1.0);
        preDelay.delayTime.value = params.preDelay;

        const convolver = offline.createConvolver();
        convolver.normalize = true;
        convolver.buffer = createImpulseResponse(offline, params.decay, 0.5);

        dryGain.gain.value = 1 - params.reverbMix;
        wetGain.gain.value = params.reverbMix;

        lowShelf.connect(dryGain);
        lowShelf.connect(highpass);
        highpass.connect(preDelay);
        preDelay.connect(convolver);
        convolver.connect(wetGain);

        dryGain.connect(summed);
        wetGain.connect(summed);
        summed.connect(outputGain);
      } else {
        lowShelf.connect(outputGain);
      }

      outputGain.connect(offline.destination);

      source.start(0);
      const rendered = await offline.startRendering();
      return rendered;
    }

    function getSettings() {
      return {
        mode: modeSelect.value,
        reverbEnabled: enableReverb.checked,
        reverbAmount: parseFloat(reverbAmount.value),
      };
    }

    function getBaseParams(settings) {
      let highShelfGain = -2;
      let highShelfFreq = 8500;
      let lowShelfGain = 0;
      let reverbMix = clamp(settings.reverbAmount, 0.1, 0.25);
      let decay = 2.2;
      let preDelay = 0.03;

      if (settings.mode === 'enhance') {
        highShelfFreq = 8000;
        lowShelfGain = 1;
      } else if (settings.mode === 'space') {
        highShelfFreq = 8500;
        preDelay = 0.025;
      }

      return {
        highShelfGain,
        highShelfFreq,
        lowShelfGain,
        enableReverb: settings.reverbEnabled || settings.mode === 'space',
        reverbMix,
        decay,
        preDelay,
        outputGain: 0.9
      };
    }

    async function analyzeSmartMode(audioBuffer) {
      const analysisSeconds = Math.min(8, audioBuffer.duration);
      const sampleRate = audioBuffer.sampleRate;
      const length = Math.floor(sampleRate * analysisSeconds);
      const mono = new Float32Array(length);

      for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
        const data = audioBuffer.getChannelData(ch);
        for (let i = 0; i < length; i++) {
          mono[i] += data[i] / audioBuffer.numberOfChannels;
        }
      }

      const fullRms = computeRms(mono);
      const peak = computePeak(mono);
      const dynamicRange = peak - fullRms;

      const highRms = await renderBandEnergy(mono, sampleRate, 8000, 16000);
      const lowRms = await renderBandEnergy(mono, sampleRate, 60, 200);

      const highRatio = fullRms > 0 ? highRms / fullRms : 0;
      const lowRatio = fullRms > 0 ? lowRms / fullRms : 0;

      if (highRatio > 0.2) return 'clean';
      if (lowRatio < 0.3) return 'enhance';
      if (dynamicRange < 0.2) return 'enhance';
      return 'space';
    }

    function computeRms(data) {
      let sum = 0;
      for (let i = 0; i < data.length; i++) {
        const v = data[i];
        sum += v * v;
      }
      return Math.sqrt(sum / data.length);
    }

    function computePeak(data) {
      let peak = 0;
      for (let i = 0; i < data.length; i++) {
        const v = Math.abs(data[i]);
        if (v > peak) peak = v;
      }
      return peak;
    }

    async function renderBandEnergy(monoData, sampleRate, lowHz, highHz) {
      const length = monoData.length;
      const offline = new OfflineAudioContext(1, length, sampleRate);
      const buffer = offline.createBuffer(1, length, sampleRate);
      buffer.copyToChannel(monoData, 0);

      const source = offline.createBufferSource();
      source.buffer = buffer;

      const highpass = offline.createBiquadFilter();
      highpass.type = 'highpass';
      highpass.frequency.value = lowHz;

      const lowpass = offline.createBiquadFilter();
      lowpass.type = 'lowpass';
      lowpass.frequency.value = highHz;

      source.connect(highpass);
      highpass.connect(lowpass);
      lowpass.connect(offline.destination);

      source.start(0);
      const rendered = await offline.startRendering();
      const data = rendered.getChannelData(0);
      return computeRms(data);
    }

    function createImpulseResponse(context, durationSec, decay) {
      const sampleRate = context.sampleRate;
      const length = Math.floor(sampleRate * durationSec);
      const impulse = context.createBuffer(2, length, sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const channel = impulse.getChannelData(ch);
        for (let i = 0; i < length; i++) {
          const t = i / length;
          const env = Math.pow(1 - t, decay * 4);
          channel[i] = (Math.random() * 2 - 1) * env;
        }
      }
      return impulse;
    }

    function audioBufferToWavBlob(buffer) {
      const wav = audioBufferToWav(buffer);
      return new Blob([wav], { type: 'audio/wav' });
    }

    function audioBufferToWav(buffer) {
      const numChannels = buffer.numberOfChannels;
      const sampleRate = buffer.sampleRate;
      const format = 1; // PCM
      const bitDepth = 16;

      let result;
      if (numChannels === 2) {
        result = interleave(buffer.getChannelData(0), buffer.getChannelData(1));
      } else {
        result = buffer.getChannelData(0);
      }

      const byteRate = sampleRate * numChannels * bitDepth / 8;
      const blockAlign = numChannels * bitDepth / 8;
      const bufferLength = result.length * 2;
      const wavBuffer = new ArrayBuffer(44 + bufferLength);
      const view = new DataView(wavBuffer);

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + bufferLength, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, format, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitDepth, true);
      writeString(view, 36, 'data');
      view.setUint32(40, bufferLength, true);

      floatTo16BitPCM(view, 44, result);
      return view;
    }

    function interleave(left, right) {
      const length = left.length + right.length;
      const result = new Float32Array(length);
      let inputIndex = 0;
      for (let index = 0; index < length;) {
        result[index++] = left[inputIndex];
        result[index++] = right[inputIndex];
        inputIndex++;
      }
      return result;
    }

    function floatTo16BitPCM(output, offset, input) {
      for (let i = 0; i < input.length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, input[i]));
        output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    function drawWaveformPlaceholder() {
      const ctx = waveform.getContext('2d');
      ctx.clearRect(0, 0, waveform.width, waveform.height);
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fillRect(0, 0, waveform.width, waveform.height);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.moveTo(0, waveform.height / 2);
      ctx.lineTo(waveform.width, waveform.height / 2);
      ctx.stroke();
    }

    function drawWaveform(buffer) {
      const ctx = waveform.getContext('2d');
      const width = waveform.width;
      const height = waveform.height;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fillRect(0, 0, width, height);

      const data = buffer.getChannelData(0);
      const step = Math.ceil(data.length / width);
      const amp = height / 2;
      ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--accent').trim();
      ctx.beginPath();
      for (let i = 0; i < width; i++) {
        let min = 1.0;
        let max = -1.0;
        for (let j = 0; j < step; j++) {
          const datum = data[(i * step) + j] || 0;
          if (datum < min) min = datum;
          if (datum > max) max = datum;
        }
        ctx.moveTo(i, (1 + min) * amp);
        ctx.lineTo(i, (1 + max) * amp);
      }
      ctx.stroke();
    }

    function preparePreview(buffer) {
      stopPreview();
      const wavBlob = audioBufferToWavBlob(buffer);
      previewUrl = URL.createObjectURL(wavBlob);
      previewAudio.src = previewUrl;
      previewAudio.load();
      playBtn.disabled = false;
      stopBtn.disabled = false;
      totalTimeEl.textContent = formatTime(previewAudio.duration || 0);
    }

    function pausePreview() {
      if (previewAudio) {
        previewAudio.pause();
      }
      stopRaf();
    }

    function stopPreview() {
      if (previewAudio) {
        previewAudio.pause();
      }
      if (previewUrl) {
        URL.revokeObjectURL(previewUrl);
        previewUrl = null;
      }
      stopRaf();
      setSeekbar(0);
      currentTimeEl.textContent = '0:00';
      playBtn.disabled = !previewAudio.src;
      stopBtn.disabled = !previewAudio.src;
    }

    function seekToEvent(e) {
      const rect = seekbar.getBoundingClientRect();
      const x = Math.min(Math.max(0, e.clientX - rect.left), rect.width);
      const ratio = rect.width ? x / rect.width : 0;
      if (previewAudio.duration) {
        previewAudio.currentTime = previewAudio.duration * ratio;
      }
      setSeekbar(ratio);
    }

    function setSeekbar(ratio) {
      seekbarFill.style.width = `${Math.min(100, Math.max(0, ratio * 100))}%`;
    }

    function startRaf() {
      stopRaf();
      const tick = () => {
        if (previewAudio.duration) {
          const ratio = previewAudio.currentTime / previewAudio.duration;
          setSeekbar(ratio);
          currentTimeEl.textContent = formatTime(previewAudio.currentTime);
        }
        rafId = requestAnimationFrame(tick);
      };
      rafId = requestAnimationFrame(tick);
    }


    function stopRaf() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
    }

    function formatTime(sec) {
      if (!isFinite(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function highlightMode(value) {
      const buttons = modeButtons.querySelectorAll('.preset-btn');
      buttons.forEach((b) => b.classList.toggle('active', b.dataset.value === value));
    }


    function setTheme(mode) {
      document.body.setAttribute('data-theme', mode);
      themeToggle.checked = mode === 'light';
      localStorage.setItem('aimc-theme', mode);
    }

    drawWaveformPlaceholder();
    setTheme(localStorage.getItem('aimc-theme') || 'dark');
    modeSelect.value = 'smart';
    updateProcessState();
  </script>
</body>
